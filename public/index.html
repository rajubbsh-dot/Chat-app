<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2-Person Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f0f; color: #e0e0e0; height: 100dvh; display: flex;
    align-items: center; justify-content: center;
  }
  .container {
    width: 100%; max-width: 480px; height: 100dvh; max-height: 800px;
    display: flex; flex-direction: column;
    background: #1a1a2e; border-radius: 0; overflow: hidden;
  }
  @media (min-width: 500px) {
    .container { border-radius: 16px; height: 90dvh; }
  }

  /* Join Screen */
  #join-screen {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; flex: 1; padding: 32px; gap: 20px;
  }
  #join-screen h1 { font-size: 28px; font-weight: 700; color: #e94560; }
  #join-screen p { color: #888; text-align: center; font-size: 14px; }
  #join-screen input {
    width: 100%; padding: 14px 18px; border-radius: 12px; border: 2px solid #333;
    background: #16213e; color: #e0e0e0; font-size: 18px; text-align: center;
    outline: none; transition: border-color .2s;
  }
  #join-screen input:focus { border-color: #e94560; }
  #join-screen button {
    width: 100%; padding: 14px; border-radius: 12px; border: none;
    background: #e94560; color: #fff; font-size: 17px; font-weight: 600;
    cursor: pointer; transition: opacity .2s;
  }
  #join-screen button:active { opacity: .8; }
  #join-error { color: #e94560; font-size: 13px; display: none; }

  /* Chat Screen */
  #chat-screen { display: none; flex-direction: column; flex: 1; }
  #chat-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px; background: #16213e; border-bottom: 1px solid #222;
  }
  #chat-header .status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #555; transition: background .3s;
  }
  #chat-header .status-dot.online { background: #4ade80; }
  #chat-header .room-code { font-weight: 600; font-size: 15px; flex: 1; }
  #chat-header .user-count { font-size: 12px; color: #888; }
  #chat-header #leave-btn {
    background: none; border: 1px solid #444; color: #bbb;
    padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 13px;
  }

  #messages {
    flex: 1; overflow-y: auto; padding: 16px; display: flex;
    flex-direction: column; gap: 8px;
  }
  #messages .msg {
    max-width: 82%; padding: 10px 14px; border-radius: 16px;
    font-size: 15px; line-height: 1.4; word-wrap: break-word;
  }
  #messages .msg.user1 { align-self: flex-start; background: #2d2d44; border-bottom-left-radius: 4px; }
  #messages .msg.user2 { align-self: flex-end; background: #e94560; border-bottom-right-radius: 4px; }
  #messages .msg .sender { font-size: 11px; opacity: .7; margin-bottom: 3px; }
  #messages .msg .time { font-size: 10px; opacity: .5; text-align: right; margin-top: 4px; }
  #messages .system-msg {
    text-align: center; font-size: 12px; color: #666; padding: 6px; margin: 4px 0;
  }

  #input-bar {
    display: flex; gap: 10px; padding: 12px 16px;
    background: #16213e; border-top: 1px solid #222;
  }
  #input-bar input {
    flex: 1; padding: 12px 16px; border-radius: 24px; border: 1px solid #333;
    background: #0f0f23; color: #e0e0e0; font-size: 15px; outline: none;
  }
  #input-bar input:disabled { opacity: .4; }
  #input-bar button {
    width: 44px; height: 44px; border-radius: 50%; border: none;
    background: #e94560; color: #fff; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity .2s;
  }
  #input-bar button:disabled { opacity: .4; }
  #input-bar button:active:not(:disabled) { opacity: .8; }
</style>
</head>
<body>

<div class="container">
  <!-- Join Screen -->
  <div id="join-screen">
    <h1>💬 Pair Chat</h1>
    <p>Share a room code with your friend.<br>No login needed — just pick a code.</p>
    <input id="room-input" type="text" placeholder="Enter room code..." maxlength="20" autocomplete="off">
    <div id="join-error">Room is full (max 2 people)</div>
    <button id="join-btn">Join Room</button>
  </div>

  <!-- Chat Screen -->
  <div id="chat-screen">
    <div id="chat-header">
      <div class="status-dot" id="status-dot"></div>
      <span class="room-code" id="room-label">Room: —</span>
      <span class="user-count" id="user-count">1/2</span>
      <button id="leave-btn">Leave</button>
    </div>
    <div id="messages"></div>
    <div id="input-bar">
      <input id="msg-input" type="text" placeholder="Type a message..." disabled autocomplete="off">
      <button id="send-btn" disabled>➤</button>
    </div>
  </div>
</div>

<script>
const wsUrl = `ws://${location.host}`;
let ws = null;
let userName = '';
let currentRoom = '';
let connected = false;

const $ = id => document.getElementById(id);

// Join
$('join-btn').addEventListener('click', joinRoom);
$('room-input').addEventListener('keydown', e => { if (e.key === 'Enter') joinRoom(); });

function joinRoom() {
  const room = $('room-input').value.trim().toLowerCase();
  if (!room) return;
  $('join-error').style.display = 'none';
  connect(room);
}

function connect(room) {
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    ws.send(JSON.stringify({ type: 'join', room }));
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    handleMessage(data);
  };

  ws.onclose = () => {
    connected = false;
    if (currentRoom) {
      showSystemMsg('Disconnected. Reconnecting...');
      setTimeout(() => connect(currentRoom), 2000);
    }
  };

  ws.onerror = () => ws.close();
}

function handleMessage(data) {
  switch (data.type) {
    case 'joined':
      currentRoom = data.room;
      userName = data.userName;
      $('join-screen').style.display = 'none';
      $('chat-screen').style.display = 'flex';
      $('room-label').textContent = `Room: ${data.room}`;
      updateUserCount(data.userCount);
      $('msg-input').disabled = false;
      $('send-btn').disabled = false;
      $('msg-input').focus();
      connected = true;
      showSystemMsg(`You joined as ${data.userName}`);
      if (data.userCount === 2) {
        showSystemMsg('You are both connected! Start chatting 💬');
      } else {
        showSystemMsg('Waiting for the other person to join...');
      }
      break;

    case 'user-joined':
      updateUserCount(data.userCount);
      $('status-dot').classList.add('online');
      showSystemMsg(`${data.userName} has joined`);
      if (data.userCount === 2) {
        showSystemMsg('You are both connected! Start chatting 💬');
      }
      break;

    case 'user-left':
      updateUserCount(1);
      $('status-dot').classList.remove('online');
      showSystemMsg('The other person has left. Waiting for someone to join...');
      break;

    case 'message':
      addMessage(data.text, data.self ? 'self' : (userName === 'User 1' ? 'user2' : 'user1'), data.from);
      break;

    case 'room-full':
      $('join-error').style.display = 'block';
      ws.close();
      break;

    case 'error':
      showSystemMsg('Error: ' + data.message);
      break;
  }
}

function addMessage(text, side, sender) {
  const el = document.createElement('div');
  el.className = `msg ${side}`;
  const displaySender = sender || (side === 'self' ? 'You' : 'Stranger');
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  el.innerHTML = `<div class="sender">${displaySender}</div>${escapeHtml(text)}<div class="time">${time}</div>`;
  $('messages').appendChild(el);
  el.scrollIntoView({ behavior: 'smooth' });
}

function showSystemMsg(text) {
  const el = document.createElement('div');
  el.className = 'system-msg';
  el.textContent = text;
  $('messages').appendChild(el);
  el.scrollIntoView({ behavior: 'smooth' });
}

function updateUserCount(count) {
  $('user-count').textContent = `${count}/2`;
  if (count === 2) $('status-dot').classList.add('online');
  else $('status-dot').classList.remove('online');
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// Sending messages
$('send-btn').addEventListener('click', sendMessage);
$('msg-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

function sendMessage() {
  const input = $('msg-input');
  const text = input.value.trim();
  if (!text || !ws || !connected) return;
  ws.send(JSON.stringify({ type: 'message', text }));
  input.value = '';
  input.focus();
}

// Leave room
$('leave-btn').addEventListener('click', () => {
  if (ws) ws.close();
  currentRoom = '';
  connected = false;
  $('chat-screen').style.display = 'none';
  $('join-screen').style.display = 'flex';
  $('messages').innerHTML = '';
  $('room-input').value = '';
  $('room-input').focus();
});
</script>
</body>
</html>
